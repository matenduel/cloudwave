# [fault] order-worker-annotation-broken OFF — Pod annotation의 수집 포트를 8080으로 되돌린다.
# 컨테이너가 실제로 여는 포트와 맞아 Prometheus 수집이 성공하고 up 값이 1로 돌아온다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-worker
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-worker
  template:
    metadata:
      labels:
        app: order-worker
        service: order-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: order-worker
          image: matenduel/cloudwave-observability:checkout-demo-0.2.0
          imagePullPolicy: IfNotPresent
          env:
            - name: SERVICE_NAME
              value: order-worker
            - name: ROLE
              value: order-worker
          ports:
            - name: http
              containerPort: 8080
