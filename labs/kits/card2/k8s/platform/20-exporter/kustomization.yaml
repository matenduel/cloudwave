apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: push-lab
resources:
  - exporter.yaml
configMapGenerator:
  - name: card2-exporter-code
    files:
      - exporter.py
  - name: card2-replay-data
    files:
      - card2_live_replay.json
      - card2_metric_meta.json
generatorOptions:
  labels:
    app.kubernetes.io/part-of: card2-observability-kit
