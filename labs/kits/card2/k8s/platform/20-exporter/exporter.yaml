apiVersion: apps/v1
kind: Deployment
metadata:
  name: card2-live-replay
  labels:
    app.kubernetes.io/name: card2-live-replay
    app.kubernetes.io/part-of: card2-observability-kit
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: card2-live-replay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: card2-live-replay
        app.kubernetes.io/part-of: card2-observability-kit
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["python3", "/app/exporter.py"]
          env:
            - name: REPLAY_DATA
              value: /data/card2_live_replay.json
            - name: METRIC_META
              value: /data/card2_metric_meta.json
            - name: REPLAY_MODE
              value: hold
            - name: LISTEN_PORT
              value: "8080"
          ports:
            - name: metrics
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: exporter-code
              mountPath: /app
              readOnly: true
            - name: replay-data
              mountPath: /data
              readOnly: true
      volumes:
        - name: exporter-code
          configMap:
            name: card2-exporter-code
            defaultMode: 0444
        - name: replay-data
          configMap:
            name: card2-replay-data
---
apiVersion: v1
kind: Service
metadata:
  name: card2-live-replay
  labels:
    app.kubernetes.io/name: card2-live-replay
    app.kubernetes.io/part-of: card2-observability-kit
spec:
  selector:
    app.kubernetes.io/name: card2-live-replay
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
