global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: card1-live-replay
    honor_labels: true
    static_configs:
      - targets: ["card1-live-replay.commerce-lab.svc.cluster.local:8080"]

  - job_name: kube-state-metrics
    static_configs:
      - targets: ["kube-state-metrics.commerce-lab.svc.cluster.local:8080"]
