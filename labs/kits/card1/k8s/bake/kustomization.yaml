apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: commerce-lab
resources:
  - job.yaml
configMapGenerator:
  - name: card1-bake-input
    files:
      - data/card1_bake_history.openmetrics.gz
      - data/card1_bake_full.openmetrics.gz
  - name: card1-bake-script
    files:
      - normalize_openmetrics.py
generatorOptions:
  labels:
    app.kubernetes.io/part-of: card1-observability-kit
