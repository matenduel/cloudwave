apiVersion: apps/v1
kind: Deployment
metadata:
  name: card3-deploy-demo
  labels:
    app.kubernetes.io/name: card3-deploy-demo
    app.kubernetes.io/part-of: card3-observability-kit
spec:
  replicas: 2
  minReadySeconds: 20
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: card3-deploy-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: card3-deploy-demo
        app.kubernetes.io/part-of: card3-observability-kit
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: demo
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "while true; do sleep 3600; done"]
          readinessProbe:
            exec:
              command: ["sh", "-c", "true"]
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
          resources:
            requests:
              cpu: 5m
              memory: 4Mi
            limits:
              cpu: 50m
              memory: 16Mi
