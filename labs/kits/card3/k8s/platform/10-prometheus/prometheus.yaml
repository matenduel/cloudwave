apiVersion: apps/v1
kind: Deployment
metadata:
  name: card3-prometheus
  labels:
    app.kubernetes.io/name: card3-prometheus
    app.kubernetes.io/part-of: card3-observability-kit
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: card3-prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: card3-prometheus
        app.kubernetes.io/part-of: card3-observability-kit
    spec:
      securityContext:
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: prom/prometheus:v3.13.1
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=7d
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 65534
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: card3-prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: card3-prometheus-data
---
apiVersion: v1
kind: Service
metadata:
  name: card3-prometheus
  labels:
    app.kubernetes.io/name: card3-prometheus
    app.kubernetes.io/part-of: card3-observability-kit
spec:
  selector:
    app.kubernetes.io/name: card3-prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
