[SERVICE]
    Flush 1
    Log_Level warn
    Parsers_File /fluent-bit/etc/parsers.conf
[INPUT]
    Name tail
    Path /logs/app.jsonl
    Tag app
    Parser json
[INPUT]
    Name tail
    Path /logs/controller.jsonl
    Tag controller
    Parser json
[OUTPUT]
    Name loki
    Match app
    Host loki
    Port 3100
    Labels job=pg-replica-lag,container=app
    Line_Format json
[OUTPUT]
    Name loki
    Match controller
    Host loki
    Port 3100
    Labels job=pg-replica-lag,container=replica-controller
    Line_Format json
