# 과거에 앵커한 로그를 즉시 조회할 수 있게 하는 단일 Loki 구성.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  reject_old_samples: false
  reject_old_samples_max_age: 87600h
  allow_structured_metadata: false
  volume_enabled: true

querier:
  query_ingesters_within: 87600h

ingester:
  chunk_idle_period: 30s
  max_chunk_age: 1m

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true

analytics:
  reporting_enabled: false
