name: cfs-throttling-baked

# 자기조사 샌드박스 — CFS CPU throttling의 실제 실행을 얼린 스냅샷.
# docker compose up 한 줄로 Prometheus 백필·Loki 주입·Grafana Explore가 준비된다.

services:
  prometheus-init:
    image: prom/prometheus:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        if [ ! -f /prometheus/.loaded ]; then
          rm -rf /prometheus/* &&
          promtool tsdb create-blocks-from openmetrics /metrics.txt /prometheus &&
          touch /prometheus/.loaded && echo INIT_DONE;
        else echo ALREADY_LOADED; fi
    volumes:
      - ./prometheus/metrics_openmetrics.txt:/metrics.txt:ro
      - promdata:/prometheus

  prometheus:
    image: prom/prometheus:latest
    depends_on:
      prometheus-init:
        condition: service_completed_successfully
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=10y
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports: ["9090:9090"]

  loki:
    image: grafana/loki:3.1.1
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    ports: ["3100:3100"]

  loki-loader:
    image: python:3.12-slim
    depends_on:
      - loki
    volumes:
      - ./loki/load_loki.py:/load_loki.py:ro
      - ./loki/logs.jsonl:/logs.jsonl:ro
    command: ["python", "/load_loki.py"]
    restart: "no"

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
      - loki
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports: ["3000:3000"]

volumes:
  promdata:
