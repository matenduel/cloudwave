name: cfs-throttling

services:
  app:
    container_name: cfs-throttling-app
    build:
      context: ./app
    cpus: "0.50"
    environment:
      LOG_PATH: /logs/app.jsonl
    volumes:
      - app_logs:/logs
    ports: ["18081:8080"]

  # cAdvisor reads the Docker Desktop Linux VM cgroup stats, including CFS quota.
  cadvisor:
    # Newer cAdvisor is required for Docker Desktop's containerd image store.
    image: gcr.io/cadvisor/cadvisor:latest
    privileged: true
    command: ["--docker_only=true", "--housekeeping_interval=1s"]
    volumes:
      - /:/rootfs:ro
      # Docker Desktop's socket must be mounted explicitly; mounting /var/run
      # alone exposes the macOS host directory rather than the Linux VM socket.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Docker Desktop 4.50+/Engine 29 keeps container metadata in containerd.
      - /run/containerd:/run/containerd:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports: ["18082:8080"]

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - app
      - cadvisor
    ports: ["19091:9090"]

  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports: ["13101:3100"]

  alloy:
    image: grafana/alloy:latest
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - app_logs:/var/log/cfs-throttling:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    ports: ["13001:3000"]

  k6:
    image: grafana/k6:latest
    profiles: ["load"]
    environment:
      TARGET: http://app:8080
    volumes:
      - ./k6:/scripts:ro
    depends_on:
      - app
    command: run /scripts/cfs-burst.js

volumes:
  app_logs:
  prometheus_data:
  loki_data:
  grafana_data:
