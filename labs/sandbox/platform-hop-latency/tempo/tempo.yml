# 자기조사 샌드박스 — Tempo (단일 바이너리, local storage). 합성 트레이스 조회용.
# OTLP receiver: HTTP 4318 · gRPC 4317. 최근(주입 시각 기준) 트레이스를 TraceQL 로 조회.
stream_over_http_enabled: true

server:
  http_listen_port: 3200
  grpc_listen_port: 9095
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  # 방금 주입한 트레이스가 빨리 조회 가능해지도록 짧게 flush
  trace_idle_period: 5s
  max_block_duration: 1m
  # 블록이 backend로 넘어간 뒤에도 ingester가 오래 서빙 → querier가 blocklist를 재스캔할 때까지 공백 없음
  complete_block_timeout: 15m

querier:
  max_concurrent_queries: 20

compactor:
  compaction:
    block_retention: 336h   # 합성 데이터 보존 넉넉히(재현성)

storage:
  trace:
    backend: local
    # querier가 새 블록을 인식하는 주기(기본 5m). complete_block_timeout(블록 완성 1m)보다 커서
    # 플러시 직후~재스캔 전 트레이스가 잠깐 안 보이는 공백이 생기므로 짧게 당긴다.
    blocklist_poll: 30s
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

usage_report:
  reporting_enabled: false
