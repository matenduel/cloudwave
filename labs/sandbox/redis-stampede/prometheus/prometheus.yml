global:
  scrape_interval: 2s
  evaluation_interval: 2s

scrape_configs:
  - job_name: app
    static_configs:
      - targets: ["app:8080"]

  - job_name: backend
    static_configs:
      - targets: ["backend:8081"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
