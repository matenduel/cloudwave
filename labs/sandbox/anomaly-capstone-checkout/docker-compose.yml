name: anomaly-capstone-checkout

# 자기조사 샌드박스(캡스톤) — 결제 플로우 다서비스 관측 스냅샷(약 3.6일)을 학생이 직접 조회.
#   docker compose up   한 줄로 Prometheus(백필)·Loki(주입)·Grafana가 데이터 실린 채 뜬다.
#   Grafana http://localhost:3000 (익명 로그인) → Explore에서 PromQL/LogQL 직접 조회.
# 데이터 창: 2026-07-09 10:00 ~ 2026-07-13 00:00 KST. Grafana 시간 범위를 이 구간으로 맞춘다.
# 데이터는 실제 클러스터에서 캡처해 얼린 실측 스냅샷(라이브 서버에 연결하지 않는다).

services:
  # OpenMetrics 텍스트(gz) → Prometheus TSDB 블록으로 1회 백필(최초 up에서만).
  # 압축 해제 시 임시로 약 1.1GB 디스크를 쓰고, 블록 생성 후 원본 텍스트는 지운다.
  prometheus-init:
    image: prom/prometheus:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        if [ ! -f /prometheus/.loaded ]; then
          rm -rf /prometheus/* &&
          gunzip -c /metrics.txt.gz > /prometheus/metrics.txt &&
          promtool tsdb create-blocks-from openmetrics /prometheus/metrics.txt /prometheus &&
          rm /prometheus/metrics.txt &&
          touch /prometheus/.loaded &&
          echo INIT_DONE;
        else echo ALREADY_LOADED; fi
    volumes:
      - ./prometheus/metrics_openmetrics.txt.gz:/metrics.txt.gz:ro
      - promdata:/prometheus

  prometheus:
    image: prom/prometheus:latest
    depends_on:
      prometheus-init:
        condition: service_completed_successfully
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=10y
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports: ["9090:9090"]

  loki:
    image: grafana/loki:3.1.1
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    ports: ["3100:3100"]

  # 얼린 로그 스냅샷(gz)을 Loki에 1회 주입 후 종료(수 분 소요, 스트리밍이라 메모리 부담 없음).
  loki-loader:
    image: python:3.12-slim
    depends_on:
      - loki
    volumes:
      - ./loki/load_loki.py:/load_loki.py:ro
      - ./loki/logs:/logs:ro
    command: ["python", "/load_loki.py"]
    restart: "no"

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
      - loki
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports: ["3000:3000"]

volumes:
  promdata:
